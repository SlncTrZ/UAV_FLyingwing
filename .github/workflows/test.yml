name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        # Install only core dependencies for CI (skip RPi-specific and quantum packages)
        pip install numpy opencv-python Pillow pyyaml loguru pymavlink requests
        pip install flask flask-socketio flask-cors
    - name: Run tests
      run: |
        pytest tests/ companion_computer/tests/ ground_station/tests/ -v --cov=. --cov-report=xml \
          --ignore=tests/test_ai_video.py \
          --ignore=tests/test_controller_gui.py \
          --ignore=tests/test_controller_windows.py \
          --ignore=companion_computer/tests/test_quantum_filtering.py \
          --ignore=companion_computer/tests/test_quantum_imu_drift.py \
          --ignore=companion_computer/tests/test_camera.py
      continue-on-error: false
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: always()
      with:
        file: ./coverage.xml
        flags: unittests
